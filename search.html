<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星空搜索</title><link rel="icon" href="img/logo.ico"><link rel="preconnect" href="https://fonts.loli.net" crossorigin><link rel="preconnect" href="https://gstatic.loli.net" crossorigin><link rel="stylesheet" href="style.css">
  <style>body{min-height:100vh;display:grid;place-items:center;background-image:url('img/bgpc.jpg');background-position:center;background-size:cover;background-attachment:fixed;transition:background-image .45s ease}.search-wrap{width:min(650px,calc(100vw - 32px));min-width:0;text-align:center;padding:45px 28px;border-radius:30px}.search-wrap img{width:80px;height:80px;object-fit:contain;border-radius:22px}.search-wrap h1{font-size:clamp(32px,7vw,58px);margin:18px 0 28px}.search-box{display:flex;background:rgba(255,255,255,.84);border-radius:18px;padding:7px;box-shadow:0 18px 45px rgba(18,66,112,.18)}.search-box input{flex:1;min-width:0;border:0;outline:0;background:transparent;color:#142b45;padding:12px;font-size:16px}.search-box button{flex:0 0 auto;border:0;border-radius:13px;padding:11px 19px;color:white;background:#1379ea;font-weight:700;cursor:pointer}.back{display:inline-block;margin-top:24px;font-size:13px}@media(max-width:700px){body{background-image:url('img/bgpe.jpg')}}@media(max-width:360px){.search-wrap{padding:32px 16px;border-radius:24px}.search-wrap h1{font-size:30px;margin-bottom:22px}.search-box{display:grid;gap:6px}.search-box input{width:100%;text-align:center}.search-box button{width:100%}}</style>
</head>
<body><main class="search-wrap glass"><img src="img/Starry sky logo air.png" alt="星空 Logo"><h1>探索更远的星空</h1><form class="search-box" action="https://cn.bing.com/search" method="get"><input name="q" type="search" placeholder="输入搜索内容" autofocus required><button type="submit">Bing 搜索</button></form><a class="back" href="index.html">← 返回服务器首页</a></main><script>
  (() => {
    const loadFont = () => {
      const stylesheet = document.createElement('link');
      stylesheet.rel = 'stylesheet';
      stylesheet.href = 'https://fonts.loli.net/css2?family=Noto+Sans+SC:wght@400;500;600;700;900&display=swap';
      document.head.appendChild(stylesheet);
    };
    if ('requestIdleCallback' in window) requestIdleCallback(loadFont, { timeout: 3000 });
    else setTimeout(loadFont, 1500);
    const endpoint = window.innerWidth <= 700
      ? 'https://www.loliapi.com/acg/pe/?type=url'
      : 'https://www.loliapi.com/acg/pc/?type=url';
    fetch(endpoint)
      .then(response => {
        if (!response.ok) throw new Error('Background request failed');
        return response.text();
      })
      .then(value => {
        const url = value.trim();
        if (!/^https?:\/\//i.test(url)) throw new Error('Invalid background URL');
        const image = new Image();
        const fallback = window.innerWidth <= 700 ? 'img/bgpe.jpg' : 'img/bgpc.jpg';
        image.onload = () => { document.body.style.backgroundImage = `url("${url.replace(/"/g, '%22')}"), url("${fallback}")`; };
        image.src = url;
      })
      .catch(() => {});
  })();
</script></body>
</html>
