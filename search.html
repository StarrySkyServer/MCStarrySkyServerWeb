<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#eaf5ff">
  <meta name="description" content="星空起始页：搜索、快捷入口、时间与管理模式。">
  <title>星空起始页</title>
  <link rel="icon" href="img/logo.ico">
  <link rel="preload" as="image" href="img/bgpc.jpg" media="(min-width: 701px)">
  <link rel="preload" as="image" href="img/bgpe.jpg" media="(max-width: 700px)">
    <link rel="stylesheet" href="search.css">
</head>
<body>
  <div class="background" id="background"></div><div class="background-tint"></div><div class="stars"></div>
  <div class="shell" id="app">
    <header class="topbar glass">
      <a class="brand" href="search.html" aria-label="星空起始页首页"><img src="img/Starry sky logo air.png" alt="星空 Logo"><span>星空起始页</span></a>
      <div class="top-actions">
        <button class="icon-btn" id="manageButton" type="button" title="开启管理模式" aria-pressed="false">⚙ <span class="label">管理</span></button>
        <button class="icon-btn theme-button" id="themeButton" type="button" title="当前主题：自动"><span id="themeIcon" aria-hidden="true">◐</span><span class="theme-label" id="themeLabel">自动</span></button>
      </div>
    </header>

    <main class="main">
      <section class="hero" aria-label="搜索区域">
        <p class="date" id="dateText"></p>
        <h1 class="clock" id="clock">00:00</h1>
        <p class="greeting" id="greeting">愿你今天也能发现一颗闪亮的星星。</p>
        <form class="search-box glass" id="searchForm" role="search">
          <button class="engine-button" id="engineButton" type="button" aria-label="选择搜索引擎" aria-haspopup="listbox" aria-expanded="false">⌕</button>
          <input class="search-input" id="searchInput" type="search" autocomplete="off" placeholder="搜索互联网，或输入网址" aria-label="搜索互联网">
          <button class="search-submit" type="submit" aria-label="开始搜索">↗</button>
          <div class="engine-menu hidden" id="engineMenu" role="listbox" aria-label="搜索引擎"></div>
        </form>
      </section>
      <section class="quick-section manage-off" id="quickSection" aria-labelledby="quickTitle">
        <div class="section-heading"><h2 id="quickTitle">QUICK ACCESS</h2><span><i class="manage-hint">管理模式已开启 · </i><b id="linkCount">0 个入口</b></span></div>
        <div class="quick-grid" id="quickGrid"></div>
      </section>
      <p class="tip">按 <b>/</b> 快速搜索 · 开启管理模式后可编辑入口 · 数据只保存在你的浏览器中</p>
    </main>
    <footer>© 2026 MC 星空服务器 · 把常用的，放在离星空最近的地方</footer>
  </div>

  <div class="utility-bar" aria-label="页面工具">
    <div class="background-tools glass">
      <button id="previousBackground" type="button" title="上一张背景" aria-label="上一张背景"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 7l-5 5 5 5M20 12H5"/></svg></button>
      <button id="nextBackground" type="button" title="随机背景" aria-label="随机背景"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 7l5 5-5 5M4 12h15"/></svg></button>
      <button id="downloadBackground" type="button" title="下载当前背景" aria-label="下载当前背景"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12M7 10l5 5 5-5M4 20h16"/></svg></button>
    </div>
    <div class="music-player glass">
      <div class="track-summary">
        <div class="cover-wrap"><img id="trackCover" src="img/Starry sky logo air.png" alt="歌曲封面"><i id="playingDot" class="hidden"></i></div>
        <div class="track-info"><strong id="trackName">星空背景音乐</strong><span id="trackArtist">Minecraft 星空服务器</span></div>
      </div>
      <div class="playback-center">
        <div class="playback-controls">
          <button id="previousTrack" type="button" class="player-control" title="上一首" aria-label="上一首"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 5v14M18 6l-9 6 9 6V6z"/></svg></button>
          <button id="playMusic" type="button" class="player-control play-control" title="播放音乐" aria-label="播放音乐"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7L8 5z"/></svg></button>
          <button id="nextTrack" type="button" class="player-control" title="下一首" aria-label="下一首"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 5v14M6 6l9 6-9 6V6z"/></svg></button>
        </div>
        <div class="progress-row"><small id="currentTime">0:00</small><input id="musicProgress" class="player-range" type="range" min="0" max="0" value="0" step="0.1" aria-label="播放进度"><small id="duration">0:00</small></div>
      </div>
      <div class="player-actions">
        <button id="playMode" type="button" class="player-control mode-button" title="播放模式：顺序循环" aria-label="播放模式：顺序循环"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17 2l3 3-3 3M4 11V9a4 4 0 014-4h12M7 22l-3-3 3-3M20 13v2a4 4 0 01-4 4H4"/></svg></button>
        <div class="volume-control">
          <button id="volumeButton" type="button" class="player-control volume-button" title="调节音量" aria-label="调节音量" aria-expanded="false"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 5L6.5 9H3v6h3.5l4.5 4V5zM15 9.5a4 4 0 010 5M18 7a7 7 0 010 10"/></svg></button>
          <div class="volume-popover glass-strong hidden" id="volumePopover"><small>音量</small><input id="volumeSlider" class="player-range" type="range" min="0" max="1" step="0.01" value="0.7" aria-label="音量"><span id="volumeText">70</span></div>
        </div>
        <button id="playlistButton" type="button" class="player-control list-control" title="播放列表" aria-label="打开播放列表" aria-expanded="false"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h12M4 11h12M4 16h8M19 14v6M16 17h6"/></svg></button>
      </div>
      <section id="playlistPanel" class="playlist-panel glass-strong hidden" aria-label="播放列表">
        <header class="playlist-header"><div><strong>播放列表</strong><small>选择要播放的歌曲</small></div><span class="playlist-count" id="playlistCount">1 首</span><button id="playlistClose" type="button" class="playlist-close" aria-label="关闭播放列表">×</button></header>
        <form class="playlist-config" id="playlistConfig"><label for="playlistId">网易云歌单 ID</label><div><input id="playlistId" inputmode="numeric" placeholder="例如 2114319187"><button id="playlistLoad" type="submit"><span>加载歌单</span><i aria-hidden="true"></i></button></div></form>
        <div class="playlist-items" id="playlistItems"></div>
      </section>
    </div>
  </div>
  <audio id="audio" preload="none"></audio>

  <div class="modal-backdrop hidden" id="modalBackdrop" role="presentation">
    <form class="modal" id="linkForm" role="dialog" aria-modal="true" aria-labelledby="linkModalTitle">
      <h2 id="linkModalTitle">添加快捷入口</h2>
      <label class="form-field">名称<input name="title" required maxlength="20" placeholder="例如：我的博客"></label>
      <label class="form-field">网址<input name="url" required type="url" placeholder="https://example.com"></label>
      <label class="form-field">图标（可选）<input name="icon" maxlength="2" placeholder="🌐"></label>
      <div class="modal-actions"><button type="button" id="cancelLink">取消</button><button class="primary" type="submit">保存入口</button></div>
    </form>
  </div>
  <div class="toast hidden" id="toast" role="status" aria-live="polite"></div>

    <script src="search.js" defer></script>
</body>
</html>
